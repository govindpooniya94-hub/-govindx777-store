<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase - GOVIND X777</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}:root{--bg:#050508;--bg2:#0a0a12;--bg3:#0f0f1a;--bg4:#1a1a2e;--accent:#ff6b35;--accent2:#e63900;--accent-dim:rgba(255,107,53,.12);--success:#22c55e;--text:#e8e8f0;--text2:#8888aa;--text3:#555577;--border:rgba(255,255,255,.06);--radius:8px;--font:'Inter','Segoe UI',system-ui,sans-serif}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased}.grain{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}.container{position:relative;z-index:1;width:100%;max-width:520px;margin:0 auto}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:28px;animation:fadeIn .4s ease;margin-bottom:16px}.logo{text-align:center;margin-bottom:20px;font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    h1{font-size:18px;font-weight:700;margin-bottom:4px}p{font-size:13px;color:var(--text2);line-height:1.6}
    .section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .product-summary{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:flex;gap:12px;align-items:center}.product-summary .icon{font-size:32px;flex-shrink:0}.product-summary .info{flex:1}.product-summary .name{font-size:14px;font-weight:600}.product-summary .price{font-size:20px;font-weight:800;color:var(--accent);margin-top:2px}
    .pay-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);border-radius:var(--radius);padding:4px}.pay-tab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .2s;color:var(--text3);background:0 0;border:none;font-family:var(--font)}.pay-tab.active{background:var(--bg4);color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.2)}.pay-tab:hover{color:var(--text)}
    .pay-panel{display:none}.pay-panel.active{display:block;animation:fadeIn .3s ease}
    .upi-box{background:linear-gradient(135deg,rgba(255,107,53,.1),rgba(255,107,53,.03));border:1px solid rgba(255,107,53,.2);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:16px}.upi-box .upi-label{font-size:11px;color:var(--text3);margin-bottom:6px}.upi-box .upi-id{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:1px;user-select:all}.upi-box .upi-note{font-size:12px;color:var(--text3);margin-top:6px}
    .qr-wrap{width:200px;margin:12px auto;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#fff}.qr-wrap img{width:100%;height:auto;display:block}
    .step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius)}.step .s-num{width:24px;height:24px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}.step .s-text{font-size:13px;color:var(--text2);line-height:1.5}
    .form-group{margin-bottom:14px}.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:all .2s ease}.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}.form-group textarea{min-height:60px;resize:vertical}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{width:100%;padding:12px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1);border:none;font-family:var(--font);display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(255,107,53,.25)}.btn-primary:hover{box-shadow:0 6px 20px rgba(255,107,53,.4);transform:translateY(-1px)}.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .error{color:#ef4444;font-size:13px;margin-bottom:14px;display:none;background:rgba(220,38,38,.1);padding:10px 14px;border-radius:var(--radius)}.error.visible{display:block}.success{color:var(--success);font-size:13px;background:rgba(34,197,94,.1);padding:14px;border-radius:var(--radius);text-align:center;display:none}.success.visible{display:block}.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}
    .back-link{display:block;text-align:center;margin-top:12px;font-size:12px;color:var(--text3);text-decoration:none}.back-link:hover{color:var(--accent)}
    .copy-btn{width:auto;margin:8px auto 0;padding:6px 16px;font-size:12px;background:var(--bg2);color:var(--accent);border:1px solid rgba(255,107,53,.3);border-radius:6px;cursor:pointer;font-family:var(--font);font-weight:600;transition:all .2s}.copy-btn:hover{background:var(--accent-dim)}
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="container" id="app"></div>
  <script>
    var slug = new URLSearchParams(window.location.search).get('slug');
    var product = null;

    function getSettings() {
      return fetch('/api/site/settings').then(function(r){return r.json()}).catch(function(){return{}});
    }

    function loadProduct() {
      var app = document.getElementById('app');
      if (!slug) { app.innerHTML = '<div class="card"><h1>No product selected</h1><a href="/" class="back-link">← Back to Store</a></div>'; return; }

      Promise.all([
        fetch('/api/products/' + slug).then(function(r){if(!r.ok)throw Error('Not found');return r.json()}),
        getSettings()
      ]).then(function(res) {
        product = res[0];
        var s = res[1];
        if (product.type !== 'paid') { window.location.href = '/'; return; }

        var upiId = s.upi_id || 'govindx777@upi';
        var upiName = s.upi_name || 'GOVIND X777';
        var binanceId = s.binance_id || '1204964627';
        var qrSrc = '/qr/qrcode.gif';
        var usdPrice = product.price_usd || (function(){var n=parseInt(product.price.replace(/[^0-9]/g,''));return n?'$'+(n*0.012).toFixed(2)+' USD':''})();

        app.innerHTML =
          '<div class="card">' +
            '<div class="logo">GOVIND X777</div>' +
            '<div class="product-summary">' +
              '<div class="icon">⚡</div>' +
              '<div class="info">' +
                '<div class="name">' + product.name + '</div>' +
                '<div class="price">' + product.price + (usdPrice ? ' <span style="font-size:12px;color:var(--text3);font-weight:500">(' + usdPrice + ')</span>' : '') + '</div>' +
              '</div>' +
            '</div>' +

            '<div class="pay-tabs" id="pay-tabs">' +
              '<button class="pay-tab active" data-tab="upi">🇮🇳 UPI / India</button>' +
              '<button class="pay-tab" data-tab="binance">🌍 Global (Binance)</button>' +
            '</div>' +

            '<div class="pay-panel active" id="panel-upi">' +
              '<div class="section-title">📱 Pay via UPI</div>' +
              '<div class="qr-wrap"><img src="' + qrSrc + '" alt="QR Code" /></div>' +
              '<div class="upi-box">' +
                '<div class="upi-label">Or send to this UPI ID</div>' +
                '<div class="upi-id" id="upi-id">' + upiId + '</div>' +
                '<button class="copy-btn" data-copy="upi-id">📋 Copy UPI ID</button>' +
                '<div class="upi-note">Open PhonePe / GPay / Paytm → Scan QR or send to UPI ID</div>' +
              '</div>' +
              '<div class="step"><div class="s-num">1</div><div class="s-text">Open any UPI app and send <strong>' + product.price + '</strong></div></div>' +
              '<div class="step"><div class="s-num">2</div><div class="s-text">Copy the <strong>Transaction ID / UTR</strong> from your app</div></div>' +
              '<div class="step"><div class="s-num">3</div><div class="s-text">Fill form below with your details and transaction ID</div></div>' +
            '</div>' +

            '<div class="pay-panel" id="panel-binance">' +
              '<div class="section-title">🌍 Pay via Binance (Global)</div>' +
              '<div class="upi-box">' +
                '<div class="upi-label">Send payment to Binance ID</div>' +
                '<div class="upi-id" id="binance-id">' + binanceId + '</div>' +
                '<button class="copy-btn" data-copy="binance-id">📋 Copy Binance ID</button>' +
                '<div class="upi-note">Open Binance app → Pay → Enter Binance ID <strong>' + binanceId + '</strong> and send <strong>' + (usdPrice || '$2.39 USD') + '</strong></div>' +
              '</div>' +
              '<div class="step"><div class="s-num">1</div><div class="s-text">Open Binance app, go to <strong>Pay</strong></div></div>' +
              '<div class="step"><div class="s-num">2</div><div class="s-text">Enter Binance ID: <strong>' + binanceId + '</strong> and send <strong>' + (usdPrice || product.price) + '</strong></div></div>' +
              '<div class="step"><div class="s-num">3</div><div class="s-text">Copy the <strong>Transaction screenshot / ID</strong> and fill form below</div></div>' +
            '</div>' +

            '<div class="section-title" style="margin-top:8px">✏️ Submit Payment Details</div>' +
            '<div class="error" id="form-error"></div>' +
            '<div class="success" id="form-success">✅ Request submitted! Admin will verify and you will get access.<br /><br /><a href="/" class="back-link" style="margin:0">← Back to Store</a></div>' +
            '<form id="pay-form">' +
              '<div class="form-row">' +
                '<div class="form-group"><label>Full Name</label><input type="text" id="f-name" required placeholder="Your name" /></div>' +
                '<div class="form-group"><label>Phone</label><input type="tel" id="f-phone" placeholder="Phone number" /></div>' +
              '</div>' +
              '<div class="form-group"><label>Email Address</label><input type="email" id="f-email" required placeholder="your@email.com" /></div>' +
              '<div class="form-group"><label>Transaction ID / UTR / Screenshot Ref</label><input type="text" id="f-txn" required placeholder="e.g. T22053112345678 or UTR number" /></div>' +
              '<div class="form-group"><label>Payment Method</label><select id="f-method">' +
                '<option value="UPI">UPI (PhonePe / GPay / Paytm)</option>' +
                '<option value="Binance">Binance (Global)</option>' +
              '</select></div>' +
              '<div class="form-group"><label>Notes (optional)</label><textarea id="f-notes" placeholder="Any info about your payment..."></textarea></div>' +
              '<button type="submit" class="btn btn-primary" id="submit-btn"><span id="submit-text">Submit for Verification</span><span id="submit-spinner" class="spinner" style="display:none"></span></button>' +
            '</form>' +
          '</div>' +
          '<a href="/" class="back-link">← Back to Store</a>';

        document.getElementById('pay-tabs').addEventListener('click', function(e) {
          var tab = e.target.closest('.pay-tab');
          if (!tab) return;
          document.querySelectorAll('.pay-tab').forEach(function(t){t.classList.remove('active')});
          document.querySelectorAll('.pay-panel').forEach(function(p){p.classList.remove('active')});
          tab.classList.add('active');
          document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
        });

        document.body.addEventListener('click', function(e) {
          var btn = e.target.closest('[data-copy]');
          if (!btn) return;
          var el = document.getElementById(btn.dataset.copy);
          if (!el) return;
          navigator.clipboard.writeText(el.textContent);
          var orig = btn.textContent;
          btn.textContent = '✅ Copied!';
          setTimeout(function(){btn.textContent = orig}, 2000);
        });

        document.getElementById('pay-form').addEventListener('submit', submitRequest);
      }).catch(function(e) {
        app.innerHTML = '<div class="card"><h1>Product not found</h1><p>' + e.message + '</p><a href="/" class="back-link">← Back to Store</a></div>';
      });
    }

    function submitRequest(e) {
      e.preventDefault();
      var errEl = document.getElementById('form-error');
      var successEl = document.getElementById('form-success');
      var form = document.getElementById('pay-form');
      var btn = document.getElementById('submit-btn');
      var txt = document.getElementById('submit-text');
      var spin = document.getElementById('submit-spinner');

      errEl.classList.remove('visible');
      errEl.style.display = 'none';

      var data = {
        product_id: product.id,
        customer_name: document.getElementById('f-name').value.trim(),
        customer_email: document.getElementById('f-email').value.trim(),
        customer_phone: document.getElementById('f-phone').value.trim(),
        transaction_id: document.getElementById('f-txn').value.trim(),
        payment_method: document.getElementById('f-method').value,
        notes: document.getElementById('f-notes').value.trim(),
      };

      if (!data.customer_name || !data.customer_email || !data.transaction_id) {
        errEl.textContent = 'Name, email, and transaction ID are required.';
        errEl.style.display = 'block';
        errEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      txt.textContent = 'Submitting...';
      spin.style.display = 'inline-block';

      fetch('/api/payments/submit-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }).then(function(r) {
        return r.json().then(function(j) { if (!r.ok) throw new Error(j.error || 'Failed'); return j; });
      }).then(function() {
        form.style.display = 'none';
        successEl.classList.add('visible');
        successEl.style.display = 'block';
      }).catch(function(e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
        errEl.classList.add('visible');
        btn.disabled = false;
        txt.textContent = 'Submit for Verification';
        spin.style.display = 'none';
      });
    }

    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>
</body>
</html>
